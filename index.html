<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Profi-Rüstplan | KI-Deep-Analysis</title>

    <link rel="manifest" href='data:application/manifest+json,{"name":"Rüstplan LIVE","short_name":"Rüstplan","display":"standalone","start_url":".","background_color":"#0f172a","theme_color":"#0f172a","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/1006/1006555.png","sizes":"512x512","type":"image/png"}]}'>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://bernardo-castilho.github.io/DragDropTouch/DragDropTouch.js"></script>

    <style>
        :root { 
            --bg-main: #0f172a; 
            --bg-sidebar: #1e293b; 
            --accent: #3b82f6; 
        }
        
        * { 
            box-sizing: border-box; 
        }
        
        html, body {
            background-color: var(--bg-main);
            color: #f1f5f9;
            margin: 0; 
            padding: 0;
            font-family: ui-sans-serif, system-ui, sans-serif;
            height: 100%;
            width: 100%;
            overflow: hidden;
            touch-action: pan-y pan-x pinch-zoom;
            overscroll-behavior-y: none;
        }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        aside { 
            width: 320px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid #334155; 
            display: flex;
            flex-direction: column;
            flex-shrink: 0; 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            position: relative;
            z-index: 50;
            overflow: hidden;
        }
        
        aside.collapsed { width: 50px; }
        aside.collapsed .sidebar-content { display: none; }

        .sidebar-content {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        .sidebar-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            padding: 1rem;
        }

        .toggle-btn {
            position: absolute; 
            right: 10px; 
            top: 15px;
            cursor: pointer; 
            background: #334155; 
            color: white;
            padding: 2px 8px; 
            border-radius: 4px; 
            font-weight: bold; 
            z-index: 10;
        }

        @media (max-width: 768px) {
            aside {
                position: fixed; 
                left: 0; 
                top: 0; 
                height: 100vh;
                width: 280px; 
                transform: translateX(-100%);
            }
            aside.mobile-open { transform: translateX(0); }
            aside.collapsed { width: 280px; transform: translateX(-100%); }
            aside.collapsed.mobile-open { transform: translateX(0); }
            aside.collapsed .sidebar-content { display: flex; flex-direction: column; flex: 1; }
            .toggle-btn { display: none; }
            .mobile-overlay {
                display: none; 
                position: fixed; 
                inset: 0;
                background: rgba(0,0,0,0.5); 
                z-index: 40;
            }
            .mobile-overlay.active { display: block; }
        }

        .mobile-menu-btn {
            display: none; 
            position: fixed; 
            top: 10px; 
            left: 10px;
            z-index: 30; 
            background: #334155; 
            color: white;
            padding: 8px 12px; 
            border-radius: 8px; 
            font-weight: bold;
            cursor: pointer; 
            border: none;
        }
        
        @media (max-width: 768px) { .mobile-menu-btn { display: block; } }

        .mobile-view-toggle {
            display: none;
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 30;
            background: #1e40af;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            border: none;
            gap: 6px;
            align-items: center;
        }

        @media (max-width: 768px) { 
            .mobile-view-toggle { display: flex; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); } 
        }

        main {
            flex-grow: 1;
            overflow-y: auto;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            touch-action: pan-x pan-y pinch-zoom;
            padding: 1rem;
            width: 100%;
            min-width: 0;
        }

        #mainGrid {
            display: grid;
            grid-template-columns: repeat(5, minmax(160px, 1fr));
            gap: 0.5rem;
            min-width: max-content;
            width: 100%;
        }

        @media (max-width: 1200px) {
            #mainGrid { grid-template-columns: repeat(3, minmax(160px, 1fr)); }
        }
        @media (max-width: 768px) {
            main { padding: 56px 0.5rem 0.5rem 0.5rem; }
            #mainGrid { grid-template-columns: repeat(5, minmax(140px, 1fr)); gap: 0.4rem; }
        }
        @media (max-width: 480px) {
            #mainGrid { grid-template-columns: repeat(5, minmax(120px, 1fr)); }
        }

        /* ── Mobile Single-Day View ── */
        @media (max-width: 768px) {
            body.mobile-day-view main {
                overflow-x: hidden;
                overflow-y: hidden;
                padding: 56px 0 0 0;
            }
            body.mobile-day-view #mainGrid {
                display: flex;
                flex-direction: row;
                min-width: unset;
                width: calc(100% * 5);
                gap: 0;
                height: 100%;
                transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            }
            body.mobile-day-view .day-column {
                width: 20%;
                flex-shrink: 0;
                min-width: unset;
                height: 100%;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
                padding: 0.5rem 0.5rem 70px 0.5rem;
            }
            #dayNavBar { display: none; }
            body.mobile-day-view #dayNavBar {
                display: flex;
                position: fixed;
                bottom: 0; left: 0; right: 0;
                z-index: 30;
                background: #1e293b;
                border-top: 1px solid #334155;
                padding: 6px 4px;
                gap: 4px;
                justify-content: space-around;
                align-items: center;
            }
        }

        .day-nav-btn {
            flex: 1;
            padding: 6px 2px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            background: #0f172a;
            color: #94a3b8;
            transition: all 0.15s;
        }
        
        .day-nav-btn.active { background: #1d4ed8; color: white; border-color: #3b82f6; }
        .day-nav-btn.today { border-color: #3b82f6; color: #60a5fa; }

        .status-eingeplant { background-color: #334155; border-left: 4px solid #64748b; }
        .status-umbau { background-color: #1e3a8a; border-left: 4px solid #3b82f6; color: #dbeafe; }
        .status-erledigt { background-color: #064e3b; border-left: 4px solid #10b981; color: #d1fae5; }
        .status-stoerung { 
            background-color: #7f1d1d; 
            border: 2px solid #ef4444 !important; 
            color: #fee2e2; 
            box-shadow: 0 0 8px 2px rgba(239,68,68,0.6), 0 0 18px 4px rgba(239,68,68,0.3);
            animation: stoerung-pulse 1.6s ease-in-out infinite;
        }

        @keyframes stoerung-pulse {
            0%   { box-shadow: 0 0 6px 2px rgba(239,68,68,0.5), 0 0 14px 4px rgba(239,68,68,0.2); }
            50%  { box-shadow: 0 0 14px 5px rgba(239,68,68,0.85), 0 0 28px 8px rgba(239,68,68,0.4); }
            100% { box-shadow: 0 0 6px 2px rgba(239,68,68,0.5), 0 0 14px 4px rgba(239,68,68,0.2); }
        }

        .machine-badge { 
            min-height: 38px; 
            margin-bottom: 6px; 
            display: flex; 
            flex-direction: row; 
            align-items: center; 
            gap: 4px; 
            padding: 4px 6px; 
            border-radius: 6px; 
            font-weight: 700; 
            font-size: 11px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); 
            width: 100%; 
            flex-wrap: wrap;
            cursor: grab; 
            transition: opacity 0.2s, transform 0.15s;
        }
        
        .machine-badge:active { cursor: grabbing; }
        .machine-badge.dragging { opacity: 0.4; transform: scale(0.97); }
        
        @media (max-width: 480px) { .machine-badge { font-size: 10px; padding: 3px 5px; min-height: 34px; } }
        
        .staff-header { 
            font-size: 11px; 
            font-weight: 900; 
            color: #94a3b8; 
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
            margin-bottom: 6px; 
        }
        
        @media (max-width: 480px) { .staff-header { font-size: 10px; } }
        
        #pool { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        
        .note-area-inline { 
            background: rgba(0,0,0,0.25); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 4px; 
            color: white; 
            font-size: 9px; 
            padding: 2px 4px; 
            height: 22px; 
            flex-grow: 1; 
            outline: none; 
            resize: none; 
            overflow: hidden; 
            white-space: nowrap; 
            min-width: 50px; 
        }
        
        .admin-input { 
            background: #0f172a; 
            border: 1px solid #334155; 
            border-radius: 6px; 
            padding: 4px 8px; 
            font-size: 11px; 
            color: white; 
            width: 100%; 
            outline: none; 
        }
        
        .delete-btn { opacity: 0; transition: opacity 0.2s; color: #ef4444; font-size: 14px; cursor: pointer; }
        .admin-item:hover .delete-btn { opacity: 1; }
        
        @media (max-width: 768px) { .delete-btn { opacity: 0.7; } }
        
        #pwModal, #statsModal, #confirmModal, #loginModal, #adminUserModal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.9); 
            z-index: 100; 
            align-items: center; 
            justify-content: center; 
            backdrop-filter: blur(8px); 
            padding: 1rem; 
        }
        
        #loginModal { z-index: 300; }
        #adminUserModal { z-index: 250; }
        #pwModal > div, #statsModal > div, #confirmModal > div { max-width: 95vw; max-height: 95vh; overflow-y: auto; }
        #confirmModal { z-index: 150; }
        
        @media (max-width: 768px) { 
            #statsModal > div { width: 100% !important; padding: 1rem; border-radius: 1rem; } 
            #statsResult { grid-template-columns: 1fr !important; } 
        }
        
        .today-highlight { 
            background-color: #3b82f6 !important; 
            color: white !important; 
            border: 2px solid #60a5fa !important; 
            box-shadow: 0 0 10px rgba(59,130,246,0.4); 
        }
        
        .day-column { min-width: 0; }
        @media (max-width: 768px) { .day-column { min-width: 140px; } }

        .drop-target { 
            outline: 2px dashed #3b82f6; 
            outline-offset: 2px; 
            background-color: rgba(59,130,246,0.08) !important; 
        }

        /* Day header with date */
        .day-header {
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            padding: 6px 4px; 
            border-radius: 8px; 
            border: 1px solid #334155;
            background: #1e293b; 
            gap: 1px; 
            margin-bottom: 4px;
        }
        
        .day-header.today-highlight { background: #3b82f6 !important; border-color: #60a5fa !important; }
        .day-header-name { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.85; }
        .day-header-date { font-size: 15px; font-weight: 900; letter-spacing: 0.01em; line-height: 1; }
        .day-header-month { font-size: 9px; font-weight: 700; opacity: 0.65; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body>
    <div id="toastContainer" class="fixed bottom-20 md:bottom-10 left-1/2 transform -translate-x-1/2 z-[400] flex flex-col gap-2 pointer-events-none"></div>

    <button class="mobile-menu-btn" onclick="toggleMobileSidebar()">☰ Menü</button>
    <button class="mobile-view-toggle" id="mobileViewToggleBtn" onclick="toggleMobileView()">⬛ Tagesansicht</button>
    <div id="dayNavBar"></div>
    <div class="mobile-overlay" id="mobileOverlay" onclick="closeMobileSidebar()"></div>

    <div id="loginModal">
        <div class="bg-slate-800 p-8 rounded-3xl shadow-2xl w-96 border border-slate-600 text-center flex flex-col items-center">
            <h3 class="text-2xl font-black mb-2 uppercase italic text-blue-500">Login</h3>
            <p class="text-[10px] text-slate-400 mb-6 font-bold uppercase">Bitte anmelden um fortzufahren</p>
            
            <select id="loginUser" class="w-full bg-slate-900 border-2 border-slate-700 rounded-xl p-3 mb-4 outline-none focus:border-blue-500 text-white font-bold appearance-none text-center">
                <option value="">Lade Benutzer...</option>
            </select>
            
            <input type="password" id="loginPw" onkeydown="if(event.key === 'Enter') doLogin()" class="w-full bg-slate-900 border-2 border-slate-700 rounded-xl p-3 mb-3 outline-none focus:border-blue-500 text-white text-center font-bold" placeholder="Passwort eingeben...">
            
            <div class="flex items-center gap-2 mb-6 w-full justify-start pl-2">
                <input type="checkbox" id="keepLoggedIn" class="w-4 h-4 cursor-pointer rounded border-slate-700 bg-slate-900 text-blue-600 focus:ring-blue-500 focus:ring-offset-slate-800">
                <label for="keepLoggedIn" class="text-[10px] text-slate-400 font-bold uppercase cursor-pointer select-none hover:text-white transition-colors">Angemeldet bleiben</label>
            </div>
            
            <button onclick="doLogin()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-black text-white shadow-md uppercase tracking-widest transition-colors">Einloggen</button>
        </div>
    </div>

    <div id="adminUserModal">
        <div class="bg-slate-800 p-6 rounded-3xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col border border-slate-600 relative">
            <button onclick="closeAdminModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white text-2xl font-bold">×</button>
            <h3 class="text-xl font-black mb-4 uppercase italic text-rose-500 text-center">Benutzer & Rechte</h3>
            <div id="adminUserList" class="flex flex-col gap-2 overflow-y-auto flex-1 pr-2"></div>
            <button onclick="saveUsersFromAdmin()" class="mt-6 w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-black uppercase tracking-widest text-white shadow-md transition-colors">Speichern</button>
        </div>
    </div>

    <div id="confirmModal">
        <div class="bg-slate-800 p-8 rounded-3xl shadow-2xl w-80 border border-slate-600 text-center">
            <h3 class="text-xl font-black mb-2 uppercase italic text-rose-500" id="confirmTitle">Löschen?</h3>
            <p class="text-sm text-slate-300 mb-6 font-medium" id="confirmText">Eintrag wirklich entfernen?</p>
            <div class="flex gap-4">
                <button onclick="closeConfirm()" class="flex-1 bg-slate-700 py-3 rounded-xl font-bold text-white shadow-md">Abbruch</button>
                <button id="confirmYesBtn" class="flex-1 bg-rose-600 hover:bg-rose-500 py-3 rounded-xl font-bold text-white shadow-md transition-colors">Löschen</button>
            </div>
        </div>
    </div>

    <div id="pwModal">
        <div class="bg-slate-800 p-8 rounded-3xl shadow-2xl w-96 border border-slate-600 text-center">
            <h3 class="text-xl font-black mb-6 uppercase italic">Berechtigung prüfen</h3>
            <input type="password" id="pwInput" onkeydown="if(event.key === 'Enter') checkPassword()" class="w-full bg-slate-900 border-2 border-slate-700 rounded-xl p-3 mb-6 outline-none focus:border-blue-500 text-white text-center" placeholder="Persönliches Passwort...">
            <div class="flex gap-4">
                <button onclick="closeModal()" class="flex-1 bg-slate-700 py-3 rounded-xl font-bold">Abbruch</button>
                <button onclick="checkPassword()" class="flex-1 bg-blue-600 py-3 rounded-xl font-bold">OK</button>
            </div>
        </div>
    </div>

    <div id="statsModal">
        <div class="bg-slate-800 p-8 rounded-3xl shadow-2xl w-[700px] max-h-[90vh] overflow-y-auto border border-slate-600 relative">
            <button onclick="closeStats()" class="absolute top-4 right-4 text-slate-400 hover:text-white text-2xl">×</button>
            <h3 class="text-xl md:text-2xl font-black mb-2 uppercase italic text-blue-400">🤖 KI Performance-Analyse</h3>
            <div class="bg-slate-900/50 p-4 rounded-2xl mb-6 flex flex-col md:flex-row gap-4 items-stretch md:items-end border border-slate-700">
                <div class="flex-1">
                    <label class="text-[9px] uppercase font-bold text-slate-500">Start KW</label>
                    <input type="number" id="statsFrom" class="admin-input block w-full">
                </div>
                <div class="flex-1">
                    <label class="text-[9px] uppercase font-bold text-slate-500">Ende KW</label>
                    <input type="number" id="statsTo" class="admin-input block w-full">
                </div>
                <button onclick="runDeepAnalysis()" class="bg-blue-600 px-6 py-2 rounded-lg font-bold text-xs uppercase hover:bg-blue-500 whitespace-nowrap">Analyse starten</button>
            </div>
            <div id="statsResult" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            <button onclick="exportDeepPDF()" class="w-full mt-8 bg-emerald-600 py-4 rounded-xl font-black uppercase text-xs tracking-widest hover:bg-emerald-500 transition-colors">Export als .PDF Report</button>
        </div>
    </div>

    <div class="app-container">
        <aside id="sidebar">
            <div class="toggle-btn" onclick="toggleSidebar()" id="sidebarBtn">«</div>
            <div class="sidebar-content">
                <div class="p-4 md:p-6 border-b border-slate-700 flex flex-col items-center justify-center flex-shrink-0 relative">
                    <button class="md:hidden text-slate-400 text-2xl absolute right-4 top-4" onclick="closeMobileSidebar()">×</button>
                    <h2 class="text-white font-black text-lg md:text-xl italic uppercase tracking-tighter">Rüstplan LIVE</h2>
                    <div id="connectionStatus" class="mt-2 flex items-center gap-1.5 text-[10px] font-bold bg-slate-800/80 px-3 py-1 rounded-full border border-slate-600 tracking-wider text-slate-400 transition-colors">
                        <span class="w-2 h-2 rounded-full bg-rose-500 animate-pulse" id="connDot"></span> Offline
                    </div>
                    <div id="logoutBtnContainer" class="mt-2 w-full text-center"></div>
                </div>
                <div class="sidebar-scroll space-y-4">
                    <details class="group" open>
                        <summary class="text-[9px] font-black text-slate-500 uppercase flex justify-between items-center mb-2 ml-1 cursor-pointer">
                            <span>KI & System</span>
                            <span class="text-[14px] group-open:rotate-180 transition-transform">▼</span>
                        </summary>
                        <div class="space-y-4 pt-2 pb-4 border-b border-slate-800 mb-2">
                            <button id="fullscreenBtn" onclick="toggleFullscreen()" class="w-full bg-slate-800 py-3 rounded-xl font-black uppercase text-[10px] tracking-widest shadow-md border border-slate-600 hover:bg-slate-700 transition">⛶ Vollbild aktivieren</button>
                            <button onclick="if(canEditMaster()) { openStats() } else { showToast('Keine Berechtigung (nur Admin/Planer)', 'error') }" class="w-full bg-gradient-to-br from-indigo-600 to-blue-700 py-3 rounded-xl font-black uppercase italic tracking-tighter shadow-xl">🤖 KI Statistik</button>
                            <button id="adminMenuBtn" onclick="openAdminModal()" class="w-full bg-rose-600/20 text-rose-400 py-3 rounded-xl font-black uppercase text-[10px] tracking-widest border border-rose-500/30 hover:bg-rose-600/40 transition hidden">⚙️ Admin Bereich</button>
                            <div class="bg-slate-800 p-4 rounded-2xl border border-slate-600 text-center">
                                <span class="text-[9px] font-black uppercase text-slate-500 block mb-2">Planungsschutz</span>
                                <button id="lockBtn" onclick="handleLockButton()" class="w-full py-2 rounded-xl font-black text-[10px] uppercase bg-emerald-600 text-white shadow-lg">🔓 Aktiv</button>
                            </div>
                        </div>
                    </details>
                    <details class="group">
                        <summary class="text-[9px] font-black text-slate-500 uppercase flex justify-between items-center mb-2 ml-1 cursor-pointer">
                            <span>Kalenderwochen</span>
                            <span class="text-[14px] group-open:rotate-180 transition-transform">▼</span>
                        </summary>
                        <div class="pt-2 pb-4 border-b border-slate-800 mb-2">
                            <div class="bg-slate-900 p-4 rounded-2xl border border-slate-700 text-center">
                                <div class="flex items-center justify-between text-white mb-2 font-black">
                                    <button onclick="changeWeek(-1)" class="p-2 hover:text-blue-400">◀</button>
                                    <span id="weekDisplay" class="italic text-sm">KW --</span>
                                    <button onclick="changeWeek(1)" class="p-2 hover:text-blue-400">▶</button>
                                </div>
                                <button onclick="goToCurrentWeek()" class="w-full text-[9px] bg-blue-600/20 text-blue-400 py-1 rounded-lg uppercase font-bold border border-blue-500/30">Heute</button>
                            </div>
                        </div>
                    </details>
                    <details class="group">
                        <summary class="text-[9px] font-black text-slate-500 uppercase flex justify-between items-center mb-2 ml-1 cursor-pointer">
                            <span>Personal</span>
                            <span class="text-[14px] group-open:rotate-180 transition-transform">▼</span>
                        </summary>
                        <div class="pt-2 pb-4 border-b border-slate-800 mb-2">
                            <div class="flex gap-1 mb-3">
                                <input type="text" id="newStaff" class="admin-input flex-1" placeholder="+ Name">
                                <button onclick="addStaff()" class="text-blue-500 font-black text-xl px-2">+</button>
                            </div>
                            <div id="staffList" class="flex flex-wrap gap-2"></div>
                        </div>
                    </details>
                    <details class="group">

        function getWeek(d) { 
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate())); 
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7)); 
            return Math.ceil((((d - new Date(Date.UTC(d.getUTCFullYear(),0,1))) / 86400000) + 1)/7); 
        }

        function getIsoYearAndWeek(d) {
            const temp = new Date(d.getTime());
            temp.setDate(temp.getDate() + 4 - (temp.getDay() || 7));
            return { year: temp.getFullYear(), week: getWeek(d) };
        }

        function getMondayOfWeek(year, week) {
            const jan4 = new Date(year, 0, 4);
            const startOfWeek1 = new Date(jan4);
            startOfWeek1.setDate(jan4.getDate() - ((jan4.getDay() + 6) % 7));
            const monday = new Date(startOfWeek1);
            monday.setDate(startOfWeek1.getDate() + (week - 1) * 7);
            return monday;
        }

        function getDayDate(dayIndex) {
            const monday = getMondayOfWeek(currentYear, currentWeek);
            const d = new Date(monday);
            d.setDate(monday.getDate() + dayIndex);
            return d;
        }

        function applySlidePosition(animated) {
            const grid = document.getElementById('mainGrid');
            if (!mobileViewActive) return;
            const vw = window.innerWidth;
            grid.style.transition = animated ? 'transform 0.35s cubic-bezier(0.4, 0, 0.2, 1)' : 'none';
            grid.style.transform = `translateX(-${activeDayIndex * vw}px)`;
        }

        function toggleMobileView() {

            const btn = document.getElementById('mobileViewToggleBtn');

                document.body.classList.add('mobile-day-view');

                const todayName = new Intl.DateTimeFormat('de-DE', { weekday: 'long' }).format(new Date());
                const todayIdx = days.indexOf(todayName);
                activeDayIndex = todayIdx >= 0 ? todayIdx : 0;
                applySlidePosition(false);
                renderDayNav();
                initSwipe();
            } else {
                document.body.classList.remove('mobile-day-view');
                btn.textContent = '⬛ Tagesansicht';
                const grid = document.getElementById('mainGrid');
                grid.style.transform = '';
                grid.style.transition = '';
                renderDayNav();
                removeSwipe();

        }

        function renderDayNav() {
            const nav = document.getElementById('dayNavBar');
            if (!mobileViewActive) { nav.innerHTML = ''; return; }
            
            const tName = new Intl.DateTimeFormat('de-DE', { weekday: 'long' }).format(new Date());
            const realIso = getIsoYearAndWeek(new Date());
            const isAW = (currentWeek === realIso.week && currentYear === realIso.year);
            
            nav.innerHTML = days.map((d, i) => {
                const isToday = isAW && d === tName;
                const isActive = i === activeDayIndex;
                const date = getDayDate(i);
                const dd = date.getDate().toString().padStart(2, '0');
                const mm = (date.getMonth() + 1).toString().padStart(2, '0');
                return `
                <button class="day-nav-btn ${isActive ? 'active' : ''} ${isToday ? 'today' : ''}" onclick="setActiveDay(${i})">
                    <div>${dayShort[i]}</div>
                    <div style="font-size:9px;opacity:0.8">${dd}.${mm}</div>
                </button>`;
            }).join('');
        }

        function setActiveDay(idx) {

            renderDayNav();

        function onTouchStart(e) {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            isSwiping = false;
        }

        function onTouchMove(e) {
            const dx = e.touches[0].clientX - touchStartX;
            const dy = e.touches[0].clientY - touchStartY;
            if (!isSwiping && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 10) {
                isSwiping = true;
            }
            if (isSwiping) {
                const vw = window.innerWidth;
                const offset = activeDayIndex * vw - dx;
                const grid = document.getElementById('mainGrid');
                grid.style.transition = 'none';
                grid.style.transform = `translateX(-${offset}px)`;
                e.preventDefault();
            }
        }

        function onTouchEnd(e) {
            if (!isSwiping) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const threshold = window.innerWidth * 0.25;
            if (dx < -threshold && activeDayIndex < days.length - 1) activeDayIndex++;
            else if (dx > threshold && activeDayIndex > 0) activeDayIndex--;
            applySlidePosition(true);
            renderDayNav();
            isSwiping = false;
        }

        function initSwipe() {
            const wrapper = document.getElementById('mainWrapper');
            wrapper.addEventListener('touchstart', onTouchStart, { passive: true });
            wrapper.addEventListener('touchmove', onTouchMove, { passive: false });
            wrapper.addEventListener('touchend', onTouchEnd, { passive: true });
        }

        function removeSwipe() {
            const wrapper = document.getElementById('mainWrapper');
            wrapper.removeEventListener('touchstart', onTouchStart);
            wrapper.removeEventListener('touchmove', onTouchMove);
            wrapper.removeEventListener('touchend', onTouchEnd);
        }

                };
                document.addEventListener('touchstart', enableAutoFullscreen, { once: true });
                document.addEventListener('click', enableAutoFullscreen, { once: true });
            }

            const savedSession = sessionStorage.getItem('loggedInUser');
            const savedLocal = localStorage.getItem('loggedInUser');
            const savedUser = savedLocal || savedSession;
            
            if (savedUser) {
                try {

                } catch(e){}

            if (!currentUser) {
                document.getElementById('loginModal').style.display = 'flex';

            const now = new Date();
            const iso = getIsoYearAndWeek(now);
            currentYear = iso.year;
            currentWeek = iso.week;
            lastRealIsoYear = iso.year;
            lastRealIsoWeek = iso.week;
            
            document.getElementById('statsFrom').value = currentWeek;
            document.getElementById('statsTo').value = currentWeek;
            listenToDatabase();
            
            db.ref('.info/connected').on('value', function(snap) {
                const statusEl = document.getElementById('connectionStatus');
                const dotEl = document.getElementById('connDot');
                if (snap.val() === true) {
                    statusEl.classList.replace('text-slate-400', 'text-emerald-400');
                    dotEl.classList.replace('bg-rose-500', 'bg-emerald-500');
                    statusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse" id="connDot"></span> Live`;
                } else {
                    statusEl.classList.replace('text-emerald-400', 'text-slate-400');
                    dotEl.classList.replace('bg-emerald-500', 'bg-rose-500');
                    statusEl.innerHTML = `<span class="w-2 h-2 rounded-full bg-rose-500 animate-pulse" id="connDot"></span> Offline`;
                }
            });

            window.lastRenderedToday = new Date().toDateString();

            setInterval(() => {
                const realNow = new Date();
                const realIso = getIsoYearAndWeek(realNow);
                
                if (realIso.year !== lastRealIsoYear || realIso.week !== lastRealIsoWeek) {
                    if (currentYear === lastRealIsoYear && currentWeek === lastRealIsoWeek) {
                        currentYear = realIso.year;
                        currentWeek = realIso.week;
                        listenToDatabase();
                    }
                    lastRealIsoYear = realIso.year;
                    lastRealIsoWeek = realIso.week;
                }

                const todayStr = new Date().toDateString();
                if (window.lastRenderedToday !== todayStr) {
                    window.lastRenderedToday = todayStr;
                    render();
                }
            }, 60000); 
        }

        async function runDeepAnalysis() {
            const from = parseInt(document.getElementById('statsFrom').value);
            const to = parseInt(document.getElementById('statsTo').value);
            const resultDiv = document.getElementById('statsResult');
            resultDiv.innerHTML = '<div class="col-span-2 text-blue-400 animate-pulse text-center py-20 font-black uppercase tracking-widest">KI berechnet Statistiken...</div>';
            
            const snapshot = await db.ref('rustplan_root').once('value');
            const data = snapshot.val() || {};
            let stats = { 
                staffCounts: {}, 
                machineRuest: {}, 
                machineStoerung: {}, 
                stoerungenProWoche: {}, 
                totalRuest: 0, 
                totalStoerung: 0, 
                details: [] 
            };
            
            for (let w = from; w <= to; w++) {
                const weekKey = `plan-${currentYear}-W${w}`;
                const weekData = data[weekKey] || {};
                stats.stoerungenProWoche[w] = 0;
                
                Object.keys(weekData).forEach(slotKey => {
                    const [day, person] = slotKey.split('-');
                    weekData[slotKey].forEach(m => {
                        stats.totalRuest++;
                        stats.machineRuest[m.name] = (stats.machineRuest[m.name] || 0) + 1;
                        stats.staffCounts[person] = (stats.staffCounts[person] || 0) + 1;
                        if (m.status === 'stoerung') { 
                            stats.totalStoerung++; 
                            stats.machineStoerung[m.name] = (stats.machineStoerung[m.name] || 0) + 1; 
                            stats.stoerungenProWoche[w]++; 
                        }
                        stats.details.push({ kw: w, tag: day, name: person, maschine: m.name, status: m.status });
                    });
                });
            }
            
            const mid = Math.floor((from + to) / 2);
            let firstHalfS = 0, secondHalfS = 0;
            
            Object.keys(stats.stoerungenProWoche).forEach(w => { 
                if (parseInt(w) <= mid) firstHalfS += stats.stoerungenProWoche[w]; 
                else secondHalfS += stats.stoerungenProWoche[w]; 
            });
            
            const trend = secondHalfS > firstHalfS ? "Steigend 📈" : (secondHalfS < firstHalfS ? "Sinkend 📉" : "Stabil ➡️");
            globalStats = { ...stats, trend };
            renderDeepStatsHTML(globalStats);
        }

        function renderDeepStatsHTML(s) {
            const bestStaff = Object.entries(s.staffCounts).sort((a,b) => b[1]-a[1])[0] || ["-", 0];
            const mostRuestMachine = Object.entries(s.machineRuest).sort((a,b) => b[1]-a[1])[0] || ["-", 0];
            const mostStoerungMachine = Object.entries(s.machineStoerung).sort((a,b) => b[1]-a[1])[0] || ["-", 0];
            
            document.getElementById('statsResult').innerHTML = `
                <div class="bg-slate-900 p-5 rounded-3xl border border-blue-500/20">
                    <span class="text-[10px] uppercase font-black text-slate-500">🏆 meisten Rüstaufträge</span>
                    <div class="text-xl md:text-2xl font-black text-white mt-1">${bestStaff[0]}</div>
                    <div class="text-xs text-blue-400 font-bold uppercase">${bestStaff[1]} erledigt</div>
                </div>
                <div class="bg-slate-900 p-5 rounded-3xl border border-rose-500/20">
                    <span class="text-[10px] uppercase font-black text-slate-500">🚨 Störungstrend</span>
                    <div class="text-xl md:text-2xl font-black text-white mt-1">${s.trend}</div>
                    <div class="text-xs text-rose-400 font-bold uppercase">${s.totalStoerung} Störungen</div>
                </div>
                <div class="bg-slate-900 p-5 rounded-3xl border border-amber-500/20">
                    <span class="text-[10px] uppercase font-black text-slate-500">🛠️ Häufigster Umbau</span>
                    <div class="text-xl md:text-2xl font-black text-white mt-1">${mostRuestMachine[0]}</div>
                    <div class="text-xs text-amber-400 font-bold uppercase">${mostRuestMachine[1]} Mal</div>
                </div>
                <div class="bg-slate-900 p-5 rounded-3xl border border-rose-600/20">
                    <span class="text-[10px] uppercase font-black text-slate-500">⚠️ Problem-Maschine</span>
                    <div class="text-xl md:text-2xl font-black text-rose-500 mt-1">${mostStoerungMachine[0]}</div>
                    <div class="text-xs text-rose-300 font-bold uppercase">${mostStoerungMachine[1]} Störungen</div>
                </div>`;
        }

        function exportDeepPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFontSize(22); 
            doc.text("KI ANALYSEBERICHT", 14, 25);
            doc.setFontSize(10); 
            doc.text(`Zeitraum: KW ${document.getElementById('statsFrom').value} bis ${document.getElementById('statsTo').value}`, 14, 32);
            
            doc.autoTable({
                startY: 40,
                head: [['Metrik', 'Ergebnis']],
                body: [
                    ['Bester Mitarbeiter', globalStats.staffCounts ? Object.entries(globalStats.staffCounts).sort((a,b)=>b[1]-a[1])[0][0] : '-'],
                    ['Gesamtzahl Umbaue', globalStats.totalRuest],
                    ['Gesamtzahl Störungen', globalStats.totalStoerung],
                    ['Störungstrend', globalStats.trend],
                    ['Häufigster Umbau (Maschine)', Object.entries(globalStats.machineRuest).sort((a,b)=>b[1]-a[1])[0][0]]
                ],
                theme: 'striped', 
                headStyles: {fillColor: [30, 41, 59]}
            });
            doc.save("KI_Performance_Report.pdf");
        }

        function handleLockButton() {
            if (isEditLocked) { 
                if(!currentUser) return;
                document.getElementById('pwModal').style.display = 'flex'; 
                document.getElementById('pwInput').focus(); 
            } else { 
                isEditLocked = true; 
                updateLockButtonUI(); 
                render(); 
                showToast('Schutz aktiviert', 'success'); 
            }
        }
        
        function checkPassword() {
            if (currentUser && users[currentUser.name] && document.getElementById('pwInput').value === users[currentUser.name].password) { 
                isEditLocked = false; 
                updateLockButtonUI(); 
                closeModal(); 
                render(); 
                showToast('Schutz aufgehoben', 'success');
            } else { 
                showToast('Falsches Passwort!', 'error'); 
            }
        }
        
        function closeModal() { 
            document.getElementById('pwModal').style.display = 'none'; 
            document.getElementById('pwInput').value = ''; 
        }
        
        function updateLockButtonUI() {
            const btn = document.getElementById('lockBtn');
            btn.innerText = isEditLocked ? "🔒 Zu" : "🔓 Auf";
            btn.className = `w-full py-2 rounded-xl font-black text-[10px] uppercase ${isEditLocked ? 'bg-rose-600' : 'bg-emerald-600'} text-white shadow-lg`;
        }

        function listenToDatabase() {
            db.ref('rustplan_root').off(); 
            db.ref('rustplan_root').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                staff = data.staff || ["Mitarbeiter 1"];
                machines = data.machines || ["Maschine 1"];
                plan = data[`plan-${currentYear}-W${currentWeek}`] || {};
                users = data.users || { "Admin": { role: "Admin", password: "admin" } };

                let usersChanged = false;
                
                staff.forEach(s => {
                    if (!users[s]) {
                        users[s] = { role: "Mitarbeiter", password: "123" };
                        usersChanged = true;
                    }
                });
                
                if (!users["Admin"]) {
                    users["Admin"] = { role: "Admin", password: "admin" };
                    usersChanged = true;
                }
                
                if (usersChanged && canEditMaster()) {
                    save();
                }

                // --- Live Sitzungs-Prüfung ---
                if (currentUser) {
                    const dbUser = users[currentUser.name];
                    // Prüfen, ob der Nutzer gelöscht wurde ODER das SessionToken abweicht
                    if (!dbUser || (dbUser.sessionToken && currentUser.sessionToken && dbUser.sessionToken !== currentUser.sessionToken)) {
                        doLogout(true); // Wirft den User sofort raus
                        return; // Beendet diesen Durchlauf für den unberechtigten User
                    }
                }

                document.getElementById('weekDisplay').innerText = `KW ${currentWeek.toString().padStart(2, '0')}`;

                populateLoginUsers();                
                updateAdminUIVisibility();
                
                render(); 
            });
        }

        function save() {
            db.ref('rustplan_root').update({
                [`/plan-${currentYear}-W${currentWeek}`]: plan,
                [`/staff`]: staff,
                [`/machines`]: machines,
                [`/users`]: users
            });
        }

        function render() {
            const main = document.getElementById('mainGrid');
            main.innerHTML = '';
            
            const todayStr = new Date().toDateString();            
            const realIso = getIsoYearAndWeek(new Date());
            const isAW = (currentWeek === realIso.week && currentYear === realIso.year);
            const months = ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];

            days.forEach((day, dayIdx) => {
                const dayDate = getDayDate(dayIdx);
                const isToday = isAW && dayDate.toDateString() === todayStr;
                const dd = dayDate.getDate().toString().padStart(2, '0');
                const monthName = months[dayDate.getMonth()];

                const col = document.createElement('div');
                col.className = 'day-column flex flex-col gap-2 min-w-0';

                const header = document.createElement('div');
                header.className = `day-header${isToday ? ' today-highlight' : ''}`;
                header.innerHTML = `
                    <div class="day-header-name">${day}</div>
                    <div class="day-header-date">${dd}. ${monthName}</div>
                `;
                col.appendChild(header);

                staff.forEach((person, idx) => {
                    const key = `${day}-${person}`;
                    const color = getStaffColor(person, idx);
                    
                    const slot = document.createElement('div');
                    slot.className = `bg-slate-900/40 rounded-lg p-2 flex flex-col border border-slate-800/50 mb-1`;
                    slot.style.borderLeft = `3px solid ${color}`;
                    slot.setAttribute('data-key', key);

                    slot.addEventListener('dragover', (e) => { 
                        e.preventDefault(); 
                        slot.classList.add('drop-target'); 
                    });
                    
                    slot.addEventListener('dragleave', () => {
                        slot.classList.remove('drop-target');
                    });
                    
                    slot.addEventListener('drop', (e) => {
                        e.preventDefault();
                        slot.classList.remove('drop-target');
                        
                        if (!canEditMaster()) {
                            return showToast('Keine Berechtigung für Zuweisungen', 'error');
                        }
                        if (isEditLocked) return;
                        
                        const targetKey = slot.getAttribute('data-key');
                        
                        if (dragSrc) {
                            const { key: srcKey, idx: srcIdx } = dragSrc;
                            if (srcKey === targetKey) { 
                                dragSrc = null; 
                                return; 
                            }
                            const item = plan[srcKey].splice(srcIdx, 1)[0];
                            if (!plan[targetKey]) plan[targetKey] = [];
                            plan[targetKey].push(item);
                            dragSrc = null;
                            save();
                        } else {
                            const name = e.dataTransfer.getData("text");
                            if (!name) return;
                            if (!plan[targetKey]) plan[targetKey] = [];
                            plan[targetKey].push({ name, status: 'eingeplant' });
                            save();
                        }
                    });

                    slot.innerHTML += `
                        <div class="staff-header" style="color:${color}">${person}</div>
                        <div id="${key}"></div>
                    `;
                    col.appendChild(slot);
                });
                main.appendChild(col);
            });

            if (mobileViewActive) {
                applySlidePosition(false);
                renderDayNav();
            }

            draw(); 
            renderStaff(); 
            renderPool();
        }

        function draw() {
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                const container = document.getElementById(key);
                if (!container) return;
                
                container.innerHTML = '';
                
                (plan[key] || []).forEach((m, idx) => {
                    const b = document.createElement('div');
                    b.className = `machine-badge status-${m.status || 'eingeplant'}`;
                    b.draggable = canEditMaster() && !isEditLocked;

                    b.addEventListener('dragstart', (e) => {
                        if (!canEditMaster() || isEditLocked) { 
                            e.preventDefault(); 
                            return; 
                        }
                        dragSrc = { key, idx };
                        e.dataTransfer.effectAllowed = 'move';
                        setTimeout(() => b.classList.add('dragging'), 0);
                    });
                    
                    b.addEventListener('dragend', () => {
                        dragSrc = null;
                        b.classList.remove('dragging');
                    });

                    const n = document.createElement('span');
                    n.className = "whitespace-nowrap overflow-hidden text-ellipsis flex-1 min-w-0 cursor-pointer mr-2";
                    n.onclick = () => {
                        if (!canEditStatus()) return showToast('Keine Berechtigung', 'error');
                        if (isEditLocked) return showToast('Planungsschutz aktiv', 'error');
                        toggleStatus(key, idx);
                    };
                    n.innerText = m.name;
                    b.appendChild(n);

                    if (m.showNote === true) {
                        const a = document.createElement('textarea');
                        a.className = "note-area-inline"; 
                        a.value = m.note || "";
                        a.disabled = !canEditStatus() || isEditLocked;
                        a.onchange = (e) => { 
                            if (!canEditStatus() || isEditLocked) return;
                            plan[key][idx].note = e.target.value; 
                            save(); 
                        };
                        b.appendChild(a);
                    }

                    const i = document.createElement('div');
                    i.className = "flex items-center gap-1 ml-auto flex-shrink-0";
                    i.innerHTML = `
                        <span onclick="if(canEditStatus() && !isEditLocked) toggleNoteInput('${key}', ${idx}); else showToast('Keine Berechtigung/Gesperrt', 'error');" class="cursor-pointer ${m.note ? 'text-yellow-400' : 'opacity-60'}">💬</span>
                        ${(canEditMaster() && !isEditLocked) ? `<span onclick="removeFromPlan('${key}', ${idx})" class="cursor-pointer opacity-40">×</span>` : ''}
                    `;
                    
                    b.appendChild(i);
                    container.appendChild(b);
                });
            });
        }

        function toggleStatus(k, i) {
            const s = ['eingeplant', 'umbau', 'erledigt', 'stoerung'];
            const cur = plan[k][i].status || 'eingeplant';
            plan[k][i].status = s[(s.indexOf(cur) + 1) % 4];
            save();
        }

        function removeFromPlan(k, i) { 
            if (canEditMaster() && !isEditLocked) { 
                plan[k].splice(i, 1); 
                save(); 
            } 
        }
        
        function changeWeek(dir) { 
            const d = getMondayOfWeek(currentYear, currentWeek);
            d.setDate(d.getDate() + (dir * 7));
            const iso = getIsoYearAndWeek(d);
            currentYear = iso.year;
            currentWeek = iso.week;
            listenToDatabase(); 
        }
        
        function goToCurrentWeek() { 
            const iso = getIsoYearAndWeek(new Date());
            currentYear = iso.year;
            currentWeek = iso.week;
            listenToDatabase(); 
        }

        function toggleNoteInput(k, i) { 
            if (plan[k][i].note === undefined) {
                plan[k][i].note = ""; 
            }
            plan[k][i].showNote = !plan[k][i].showNote; 
            save(); 
        }
        
        function addStaff() { 
            if (!canEditMaster()) return showToast('Nur Admin / Planer!', 'error');
            const v = document.getElementById('newStaff').value.trim(); 
            if(v) { 
                staff.push(v); 
                if (!users[v]) users[v] = { role: 'Mitarbeiter', password: '123' };
                save(); 
                document.getElementById('newStaff').value = ''; 
                showToast('Personal hinzugefügt', 'success');
            } 
        }
        
        function addMachine() { 
            if (!canEditMaster()) return showToast('Nur Admin / Planer!', 'error');
            const v = document.getElementById('newMachine').value.trim(); 
            if(v) { 
                machines.push(v); 
                save(); 
                document.getElementById('newMachine').value = ''; 
                showToast('Maschine hinzugefügt', 'success');
            } 
        }
        
        function renderStaff() { 
            document.getElementById('staffList').innerHTML = staff.map(n => `
                <div class="admin-item bg-slate-800 px-2 py-1 rounded text-[10px] flex items-center gap-2">
                    ${n}
                    <span onclick="if(canEditMaster()){ askConfirm('Personal löschen', '${n} wirklich entfernen?', () => { staff=staff.filter(s=>s!=='${n}'); delete users['${n}']; save(); }); } else { showToast('Keine Berechtigung', 'error'); }" class="delete-btn">×</span>
                </div>
            `).join(''); 
        }
        
        function renderPool() { 
            document.getElementById('pool').innerHTML = machines.map(m => `
                <div draggable="true" ondragstart="if(!canEditMaster()){event.preventDefault(); return showToast('Keine Berechtigung', 'error');} dragSrc=null; event.dataTransfer.setData('text', '${m}')" class="admin-item bg-slate-800 p-2 rounded text-[9px] flex justify-between items-center cursor-move">
                    <span>⚙️ ${m}</span>
                    <span onclick="if(canEditMaster()){ askConfirm('Maschine löschen', '${m} wirklich entfernen?', () => { machines=machines.filter(x=>x!=='${m}'); save(); }); } else { showToast('Keine Berechtigung', 'error'); }" class="delete-btn">×</span>
                </div>
            `).join(''); 
        }
        
        window.onload = initApp;
    </script>
</body>
</html>
